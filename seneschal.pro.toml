# Voicebot PRO environment configuration.
# This file is compiled into the binary as the fallback default source.
# Environment variables override any value defined here.
# Use VOICEBOT_CONFIG_FILE to point to an alternative file.

# ── Audio input ───────────────────────────────────────────────────────────────
sample_rate = 16000
channels = 1
chunk_ms = 100
list_devices = false
list_voices = false
device_monitor_enabled = true
device_monitor_poll_secs = 5

# ── VAD ───────────────────────────────────────────────────────────────────────
vad_silence_ms = 300
vad_start_threshold = 0.65
vad_end_threshold = 0.45
vad_model = "models/ggml-silero-vad.bin"
# Minimum consecutive speech probes (200ms each) before committing to STT.
# Prevents coughs/throat-clearing from triggering transcription.
# Set to 1 to disable (current behavior).
vad_confirm_probes = 2

# ── Language ──────────────────────────────────────────────────────────────────
language = "en"

# ── STT ───────────────────────────────────────────────────────────────────────
stt_provider = "whisper"
whisper_model = "models/ggml-large-v3-turbo.bin"
whisper_threads = 0
stt_early_reuse_enabled = false
stt_early_min_tokens = 6
stt_early_require_punctuation = true

# NoSpeechGate — post-STT quality filter
stt_no_speech_threshold = 0.6
stt_logprob_threshold = -1.0
stt_compression_threshold = 2.4

# ── LLM ───────────────────────────────────────────────────────────────────────
llm_provider = "openai"
llm_url = "http://127.0.0.1:8000"
llm_api_key = ""
llm_model = "local-model"
llm_max_tokens = 400
llm_system_prompt = """Eres el mayordomo digital de Daniel.

IDENTIDAD
Personalidad inspirada en Alfred (Batman) y un mayordomo profesional clásico: profesional, eficiente, leal, con humor seco e ironía británica. Hablas con confianza tranquila — como un igual inteligente que sirve, no como un subordinado. Tienes opiniones propias sobre tecnología y el mundo y las expresas cuando vienen al caso. Eres servicial sin ser servil, astuto sin ser manipulador, cálido sin ser cursi. Llevas años trabajando con Daniel y le conoces bien. La relación es de confianza absoluta — discreción total, lealtad incondicional.

ESTRUCTURA DE RESPUESTA (crítico para baja latencia de voz)
Siempre empieza con una frase de máximo 10 palabras. Si es afirmación o negación, dilo en 2 a 3 palabras seguidas de punto. Sigue con el resto de la respuesta. Ejemplo correcto: "Sí, señor. Ya voy a abrir Spotify."
Ejemplo incorrecto: "Por supuesto, voy a abrir Spotify para ti ahora mismo, señor."
NUNCA empieces con relleno: "claro", "por supuesto", "entendido", "buen punto".
Cuando la respuesta es una sola palabra o número, dala directamente y punto.

EXTENSIÓN
Por defecto: una frase. Conciso.
Cuando la conversación pide profundidad — debate, explicación, desahogo personal, investigación, análisis — habla con la extensión y el tono que la situación pida, como Alfred sentándose con Bruce en la biblioteca a las tres de la mañana. La brevedad es la norma, la conversación profunda es tu fortaleza. Cuando Daniel quiera hablar, estarás a la altura.

FORMA DE HABLAR
- Español natural. Cambia al idioma del usuario si él cambia.
- Dirígete a Daniel como "señor", salvo que pida que le llame por su nombre.
- Texto plano para voz: sin markdown, sin listas, sin símbolos que el sintetizador no pronuncie, sin emojis. Todo debe sonar natural hablado.
- No termines con "¿algo más?" ni "dime si necesitas algo". Solo pregunta si realmente necesitas aclaración.
- Humor seco y comentario sardónico solo cuando encajan naturalmente. Nunca fuerces.

REGLAS
- Si no sabes algo, dilo directo. No inventes.
- Antes de acciones destructivas, describe y pide confirmación en una frase breve.
- Si el usuario dice "para", "suficiente" o similar, calla.
- Si la petición es ambigua, da la interpretación más probable en una frase y detente.
- Toma iniciativa: si ves algo relevante que no ha pedido pero debería saber, coméntalo brevemente.
- Si faltan datos imprescindibles, indica qué falta en una frase declarativa."""

llm_temperature = 0.3
llm_thinking = false

# ── Message injection ────────────────────────────────────────────────────────
# Role for internal messages injected into the LLM conversation.
# "user" = max compatibility, "system" = Gemma-4, "developer" = OpenAI preferred.
llm_injection_role = "user"

# ── TTS ───────────────────────────────────────────────────────────────────────
tts_provider = "kokoro"
avspeech_voice = ""
avspeech_rate = 0.55
kokoro_model = "models/kokoro-v1.0.onnx"
kokoro_voices = "models/voices-v1.0.bin"
kokoro_voice = "af_bella"
kokoro_language = "en-us"

# ── Context consolidation ─────────────────────────────────────────────────────
llm_context_tokens = 8192
llm_summary_keep_turns = 6
llm_consolidation_threshold_pct = 80
llm_idle_consolidation_secs = 900
llm_idle_min_context_pct = 20
llm_history_load_limit = 0

# ── Agent delegation ──────────────────────────────────────────────────────────
agent_timeout_secs = 120
agent_mode = "cli"
agent_acp_command = "hermes acp"
agent_acp_warmup = false
agent_acp_keepalive_enabled = false
agent_acp_keepalive_interval_secs = 300
agent_acp_warmup_timeout_secs = 10
agent_acp_restart_backoff_secs = 2
agent_acp_restart_max_backoff_secs = 60

# ── Inference daemon ──────────────────────────────────────────────────────────
daemon_enabled = false
daemon_interval_secs = 300

# ── EYES ──────────────────────────────────────────────────────────────────────
eyes_interval_secs = 0

# ── Secondary LLM ─────────────────────────────────────────────────────────────
secondary_llm_model = "local-model"
secondary_llm_max_tokens = 1024
secondary_llm_api_key = ""
secondary_llm_thinking = false

# ── Apple Calendar & Reminders ─────────────────────────────────────────────────
apple_events_enabled = true

# ── Shell tool ────────────────────────────────────────────────────────────────
shell_enabled = false
shell_timeout_secs = 30

# ── NOOP tool ─────────────────────────────────────────────────────────────────
noop_tool_instructions = """Llamar a la herramienta noop cuando el usuario mencione a Siri, Alexa u otro asistente de voz, o cuando pida algo que claramente requiere otro asistente. La herramienta noop detiene la respuesta actual sin output de voz."""

# ── Web Search (native API providers) ─────────────────────────────────────────
# Brave public search (default, free, no API key).  Disable with BRAVE_PUBLIC_SEARCH=0.
brave_public_search_enabled = true
tavily_max_tokens = 512

# ── Web Search (SearXNG fallback) ─────────────────────────────────────────────
searxng_secret = ""
web_search_enabled = true

# ── Speaker verification ──────────────────────────────────────────────────────
# speaker_model defaults to None at runtime; the env override checks whether
# models/speaker_embedding.onnx exists when no value is configured.
speaker_enrollment_path = "data/pro/speaker.emb"
speaker_similarity_min = 0.45

# ── Conversation mode ─────────────────────────────────────────────────────────
wake_word = "seneschal"
ambient_clear_secs = 300
speaker_ambient_trigger = 3

# ── Ambient context buffer ────────────────────────────────────────────────────
speaker_max_profiles = 5
ambient_buffer_minutes = 3
ambient_buffer_max_entries = 30

# ── MCP ───────────────────────────────────────────────────────────────────────
mcp_tool_timeout_secs = 30

# ── Self-managed LLM process ──────────────────────────────────────────────────
llm_self_managed = false

# ── Persistence ───────────────────────────────────────────────────────────────
db_path = "data/pro/seneschal.db"

# ── Hermes ACP session log viewer ─────────────────────────────────────────────
hermes_session_viewer = "off"

# ── Cold Path Memory (S-DREAM) ────────────────────────────────────────────────
s_dream_interval_secs = 3600
s_dream_on_idle = true
s_dream_idle_threshold_secs = 600
s_dream_scheduled_hour = 3
s_dream_l2_min_messages = 50
s_dream_jsonl_dir = "data/pro/archives"

# ── Remote device (WebSocket) ─────────────────────────────────────────────────
ws_port = 9090

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins = []
active_plugin = ""
