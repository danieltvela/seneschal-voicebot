{% extends "base.html" %}

{% block content %}
<div class="delete-confirm">
    <h1>Delete Message</h1>
    <p class="danger">Are you sure you want to delete this message?</p>
    <p>Message ID: <code>{{ message_id }}</code></p>
    <p>Content preview: <code>{{ content_preview }}</code></p>
    <form method="post" action="/messages/{{ message_id }}/delete">
        <button type="submit" class="btn-delete" style="font-size:16px; padding:8px 20px;">Yes, Delete</button>
    </form>
    <a href="/messages">Cancel</a>
</div>
{% endblock %}
