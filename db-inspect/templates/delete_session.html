{% extends "base.html" %}

{% block content %}
<div class="delete-confirm">
    <h1>Delete Session</h1>
    <p class="danger">Are you sure you want to delete this session?</p>
    <p>This will permanently remove the session and all {{ message_count }} associated messages.</p>
    <p>Session ID: <code>{{ session_id }}</code></p>
    <form method="post" action="/sessions/{{ session_id }}/delete">
        <button type="submit" class="btn-delete" style="font-size:16px; padding:8px 20px;">Yes, Delete</button>
    </form>
    <a href="/sessions">Cancel</a>
</div>
{% endblock %}
