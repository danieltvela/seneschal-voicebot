name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTUP_HOME: /root/.rustup
  CARGO_HOME: /root/.cargo

jobs:
  check:
    name: Format + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable via rustup
        run: |
          set -euo pipefail
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal --component rustfmt --component clippy
            echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
          else
            rustup component add rustfmt clippy
          fi
          cargo --version
          cargo fmt --version
          cargo clippy --version

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev espeak-ng pkg-config build-essential cmake libgomp1

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --no-deps --features tui,remote,control -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C link-arg=-lgomp"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable via rustup
        run: |
          set -euo pipefail
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
            echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
          fi
          cargo --version

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev espeak-ng pkg-config build-essential cmake libgomp1

      - name: Run tests
        run: cargo test --features "tui,remote,control"

      - name: Run e2e tests (wiremock)
        run: cargo test e2e -- --ignored

  build-linux:
    name: Build · Linux
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C link-arg=-lgomp"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable via rustup
        run: |
          set -euo pipefail
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
            echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
          fi
          cargo --version

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev espeak-ng pkg-config build-essential cmake libgomp1

      - name: Build (kokoro)
        run: cargo build --release --bin voicebot --features kokoro
